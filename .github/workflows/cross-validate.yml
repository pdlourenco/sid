name: Cross-Language Validation

# Validates numerical equivalence across language implementations.
# Currently generates reference data from MATLAB only.
# Python and Julia validation jobs will be added in future phases.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'testdata/**'
      - 'spec/**'

jobs:
  generate-reference:
    name: Generate reference data (MATLAB)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2.7.0

      - name: Generate reference data
        uses: matlab-actions/run-command@v2.4.1
        with:
          command: run('testdata/generate_reference.m')

      - name: Upload reference data
        uses: actions/upload-artifact@v4
        with:
          name: reference-data
          path: testdata/*.json

  validate-python:
    name: Validate Python port
    needs: generate-reference
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install sid Python package
        run: pip install -e "./python[dev]"

      - name: Download reference data
        uses: actions/download-artifact@v4
        with:
          name: reference-data
          path: testdata/

      - name: Run cross-validation tests
        run: python -m pytest python/tests/test_cross_validation.py -v

  # Future: validate-julia job (Phase 3)
